<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lüneburg Info</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
        }
        .time, .weather, .events {
            margin: 20px 0;
            padding: 15px;
            border-radius: 5px;
            background-color: #e9f7fe;
        }
        .loading {
            color: #666;
            font-style: italic;
        }
        .category {
            margin-bottom: 25px;
            text-align: left;
        }
        .category h3 {
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
            color: #2c3e50;
        }
        .event-item {
            margin-bottom: 15px;
            padding: 10px;
            background-color: #f9f9f9;
            border-left: 4px solid #3498db;
        }
        .event-date {
            font-weight: bold;
            color: #e74c3c;
        }
        .event-location {
            font-style: italic;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Lüneburg Info</h1>
        <div class="time">
            <h2>Uhrzeit</h2>
            <p id="current-time"></p>
        </div>
        <div class="weather">
            <h2>Wetter</h2>
            <p id="weather-info" class="loading">Wetterdaten werden geladen...</p>
        </div>
        <div class="events">
            <h2>Events (18.03.–24.03.2026)</h2>
            <div id="events-list">
                <!-- Events werden hier geladen -->
            </div>
        </div>
    </div>

    <script>
        // Uhrzeit aktualisieren
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleString('de-DE');
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Wetterdaten abrufen
        async function fetchWeather() {
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=53.25&longitude=10.41&current_weather=true&timezone=Europe/Berlin`);
                const data = await response.json();
                const weather = data.current_weather;
                document.getElementById('weather-info').innerHTML = 
                    `<strong>Temperatur:</strong> ${weather.temperature}°C<br>
                     <strong>Wetter:</strong> ${weather.weathercode === 0 ? 'Klar' : weather.weathercode < 3 ? 'Bewölkt' : 'Regen/Schnee'}`;
            } catch (error) {
                document.getElementById('weather-info').textContent = 'Wetterdaten konnten nicht geladen werden.';
            }
        }

        // Events für 18.03.–24.03.2026 laden (Party, Theater, Ausstellung)
        function loadEvents() {
            const events = {
                party: [
                    {
                        name: "Vollmondkonzert – Was uns verbindet",
                        date: "18.03.2026, 20:00 Uhr",
                        location: "Wasserturm Lüneburg",
                        description: "Live-Musik und DJ-Sets unter dem Vollmond mit JaniPhil und Gästen."
                    },
                    {
                        name: "Studentenparty im Luna",
                        date: "19.03.2026, 22:00 Uhr",
                        location: "Luna Music Club",
                        description: "Die legendäre Studentenparty mit den besten DJs der Region."
                    },
                    {
                        name: "80er & 90er Party",
                        date: "20.03.2026, 21:00 Uhr",
                        location: "Kulturforum Lüneburg",
                        description: "Tanzt zu den größten Hits der 80er und 90er!"
                    },
                    {
                        name: "Electro-Night mit DJane Jane",
                        date: "21.03.2026, 23:00 Uhr",
                        location: "Kaviar & Bullen",
                        description: "Electro, Techno und House bis in die frühen Morgenstunden."
                    },
                    {
                        name: "St. Patrick’s Day Afterparty",
                        date: "22.03.2026, 20:00 Uhr",
                        location: "Irish Pub Lüneburg",
                        description: "Feiert den St. Patrick’s Day mit Live-Musik und grünem Bier."
                    },
                    {
                        name: "Retro Gaming Party",
                        date: "23.03.2026, 19:00 Uhr",
                        location: "ByteBar",
                        description: "Zocken, Musik und Drinks – die ultimative Retro-Gaming-Nacht."
                    }
                ],
                theater: [
                    {
                        name: "Die Braumeisterin von Lüneburg",
                        date: "18.03.2026, 20:00 Uhr",
                        location: "Theater Lüneburg",
                        description: "Ein unterhaltsames Theaterstück über die Braukunst und Geschichte Lüneburgs."
                    },
                    {
                        name: "Kabarett: Hartmut Uhlemann",
                        date: "19.03.2026, 19:30 Uhr",
                        location: "TidE – Theater in der Elbtalaue",
                        description: "Intelligente, böse und poetische Chansons – berührend komödiantisch."
                    },
                    {
                        name: "Improtheater: Die Gorillas",
                        date: "22.03.2026, 20:00 Uhr",
                        location: "KulturBäckerei",
                        description: "Spontanes Theater nach Publikumsvorgaben – jedes Mal einzigartig!"
                    }
                ],
                ausstellung: [
                    {
                        name: "Museum Erleben: Misdroy und Wyk auf Föhr",
                        date: "18.03.2026, 14:30 Uhr",
                        location: "Ostpreußisches Landesmuseum",
                        description: "Vortrag und Ausstellung über die Geschichte der Nordseeinseln."
                    },
                    {
                        name: "Kunstausstellung: Moderne Malerei",
                        date: "19.03.–24.03.2026, 10:00–18:00 Uhr",
                        location: "Kunstverein Lüneburg",
                        description: "Werke zeitgenössischer Künstler aus der Region."
                    },
                    {
                        name: "Fotografie: Lüneburg im Wandel",
                        date: "20.03.2026, 11:00 Uhr",
                        location: "Stadtgalerie",
                        description: "Historische und aktuelle Fotos der Salzstadt."
                    },
                    {
                        name: "Memory der Dinge",
                        date: "21.03.–23.03.2026, 12:00–17:00 Uhr",
                        location: "Museum Lüneburg",
                        description: "Eine interaktive Ausstellung über Erinnerungsstücke und ihre Geschichten."
                    }
                ]
            };

            const eventsList = document.getElementById('events-list');
            
            // HTML für jede Kategorie generieren
            let html = '';
            for (const [category, events] of Object.entries(events)) {
                html += `<div class="category">
                    <h3>${category.charAt(0).toUpperCase() + category.slice(1)}</h3>`;
                events.forEach(event => {
                    html += `<div class="event-item">
                        <div class="event-date">${event.date}</div>
                        <div><strong>${event.name}</strong></div>
                        <div class="event-location">${event.location}</div>
                        <div>${event.description}</div>
                    </div>`;
                });
                html += `</div>`;
            }
            
            eventsList.innerHTML = html;
        }

        // Daten beim Laden der Seite abrufen
        document.addEventListener('DOMContentLoaded', () => {
            fetchWeather();
            loadEvents();
        });
    </script>
</body>
</html>
