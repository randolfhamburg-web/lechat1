<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stadtinfo: Lüneburg & Harburg</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
        }
        .city-selector {
            margin: 20px 0;
            padding: 10px;
            background-color: #e9f7fe;
            border-radius: 5px;
        }
        select {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        .time, .weather, .events {
            margin: 20px 0;
            padding: 15px;
            border-radius: 5px;
            background-color: #e9f7fe;
        }
        .loading {
            color: #666;
            font-style: italic;
        }
        .category {
            margin-bottom: 25px;
            text-align: left;
        }
        .category h3 {
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
            color: #2c3e50;
        }
        .event-item {
            margin-bottom: 15px;
            padding: 10px;
            background-color: #f9f9f9;
            border-left: 4px solid #3498db;
        }
        .event-date {
            font-weight: bold;
            color: #e74c3c;
        }
        .event-location {
            font-style: italic;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stadtinfo: Lüneburg & Harburg</h1>
        <div class="city-selector">
            <label for="city-select">Stadt auswählen:</label>
            <select id="city-select" onchange="updateCity()">
                <option value="lüneburg">Lüneburg</option>
                <option value="harburg">Harburg</option>
            </select>
        </div>
        <div class="time">
            <h2>Uhrzeit</h2>
            <p id="current-time"></p>
        </div>
        <div class="weather">
            <h2>Wetter</h2>
            <p id="weather-info" class="loading">Wetterdaten werden geladen...</p>
        </div>
        <div class="events">
            <h2 id="events-title">Events (Heute–Nächste 6 Tage)</h2>
            <div id="events-list">
                <!-- Events werden hier geladen -->
            </div>
        </div>
    </div>

    <script>
        // Aktuelle Stadt
        let currentCity = 'lüneburg';
        
        // Helfer: Formatiere Datum als DD.MM.YYYY
        function formatDate(date) {
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${day}.${month}.${year}`;
        }
        
        // Helfer: Prüfe, ob ein Event im aktuellen Zeitraum liegt
        function isEventInRange(eventDateStr, startDate, endDate) {
            const eventDateParts = eventDateStr.split(',')[0].trim().split('.').reverse();
            // Prüfe, ob das Datum im Format DD.MM.YYYY vorliegt
            if (eventDateParts.length === 3) {
                const eventDate = new Date(eventDateParts.join('-'));
                return eventDate >= startDate && eventDate <= endDate;
            }
            // Falls kein Datum gefunden wird, überspringen
            return false;
        }
        
        // Berechne den aktuellen Zeitraum (heute + 6 Tage)
        function getDateRange() {
            const today = new Date();
            const endDate = new Date(today);
            endDate.setDate(today.getDate() + 6);
            return { start: today, end: endDate };
        }

        // Uhrzeit aktualisieren
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleString('de-DE');
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Wetterdaten abrufen
        async function fetchWeather() {
            try {
                const coords = currentCity === 'lüneburg' ? { lat: 53.25, lon: 10.41 } : { lat: 53.4667, lon: 10.1833 };
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&current_weather=true&timezone=Europe/Berlin`);
                const data = await response.json();
                const weather = data.current_weather;
                document.getElementById('weather-info').innerHTML = 
                    `<strong>Temperatur:</strong> ${weather.temperature}°C<br>
                     <strong>Wetter:</strong> ${weather.weathercode === 0 ? 'Klar' : weather.weathercode < 3 ? 'Bewölkt' : 'Regen/Schnee'}`;
            } catch (error) {
                document.getElementById('weather-info').textContent = 'Wetterdaten konnten nicht geladen werden.';
            }
        }

        // Events für die ausgewählte Stadt laden (nur im aktuellen Zeitraum)
        function loadEvents() {
            const dateRange = getDateRange();
            const eventsTitle = document.getElementById('events-title');
            eventsTitle.textContent = `Events (${formatDate(dateRange.start)}–${formatDate(dateRange.end)})`;

            const allEvents = {
                lüneburg: {
                    party: [
                        { name: "Vollmondkonzert – Was uns verbindet", date: "18.03.2026, 20:00 Uhr", location: "Wasserturm Lüneburg", description: "Live-Musik und DJ-Sets unter dem Vollmond mit JaniPhil und Gästen." },
                        { name: "Studentenparty im Luna", date: "19.03.2026, 22:00 Uhr", location: "Luna Music Club", description: "Die legendäre Studentenparty mit den besten DJs der Region." },
                        { name: "80er & 90er Party", date: "20.03.2026, 21:00 Uhr", location: "Kulturforum Lüneburg", description: "Tanzt zu den größten Hits der 80er und 90er!" },
                        { name: "Electro-Night mit DJane Jane", date: "21.03.2026, 23:00 Uhr", location: "Kaviar & Bullen", description: "Electro, Techno und House bis in die frühen Morgenstunden." },
                        { name: "St. Patrick’s Day Afterparty", date: "22.03.2026, 20:00 Uhr", location: "Irish Pub Lüneburg", description: "Feiert den St. Patrick’s Day mit Live-Musik und grünem Bier." },
                        { name: "Retro Gaming Party", date: "23.03.2026, 19:00 Uhr", location: "ByteBar", description: "Zocken, Musik und Drinks – die ultimative Retro-Gaming-Nacht." }
                    ],
                    theater: [
                        { name: "Die Braumeisterin von Lüneburg", date: "18.03.2026, 20:00 Uhr", location: "Theater Lüneburg", description: "Ein unterhaltsames Theaterstück über die Braukunst und Geschichte Lüneburgs." },
                        { name: "Kabarett: Hartmut Uhlemann", date: "19.03.2026, 19:30 Uhr", location: "TidE – Theater in der Elbtalaue", description: "Intelligente, böse und poetische Chansons – berührend komödiantisch." },
                        { name: "Improtheater: Die Gorillas", date: "22.03.2026, 20:00 Uhr", location: "KulturBäckerei", description: "Spontanes Theater nach Publikumsvorgaben – jedes Mal einzigartig!" }
                    ],
                    ausstellung: [
                        { name: "Museum Erleben: Misdroy und Wyk auf Föhr", date: "18.03.2026, 14:30 Uhr", location: "Ostpreußisches Landesmuseum", description: "Vortrag und Ausstellung über die Geschichte der Nordseeinseln." },
                        { name: "Kunstausstellung: Moderne Malerei", date: "19.03.–24.03.2026, 10:00–18:00 Uhr", location: "Kunstverein Lüneburg", description: "Werke zeitgenössischer Künstler aus der Region." },
                        { name: "Fotografie: Lüneburg im Wandel", date: "20.03.2026, 11:00 Uhr", location: "Stadtgalerie", description: "Historische und aktuelle Fotos der Salzstadt." },
                        { name: "Memory der Dinge", date: "21.03.–23.03.2026, 12:00–17:00 Uhr", location: "Museum Lüneburg", description: "Eine interaktive Ausstellung über Erinnerungsstücke und ihre Geschichten." }
                    ],
                    konzerte: [
                        { name: "Konzert: Ina Müller live", date: "19.03.2026, 20:00 Uhr", location: "LKH Arena Lüneburg", description: "Die beliebte Sängerin mit ihren größten Hits." },
                        { name: "Jazz-Abend mit der Lüneburg Big Band", date: "21.03.2026, 19:30 Uhr", location: "Kulturforum Lüneburg", description: "Klassischer Jazz und moderne Interpretationen." },
                        { name: "Indie-Konzert: The New Shores", date: "23.03.2026, 20:30 Uhr", location: "Kaviar & Bullen", description: "Aufstrebende Indie-Band aus Hamburg." }
                    ]
                },
                harburg: {
                    party: [
                        { name: "Harburger Hafenparty", date: "18.03.2026, 21:00 Uhr", location: "Hafenclub Harburg", description: "Elektronische Musik und Drinks direkt am Hafen." },
                        { name: "After-Work-Party", date: "20.03.2026, 19:00 Uhr", location: "Brauhaus Harburg", description: "Gemütliches Beisammensein mit Live-Musik." },
                        { name: "Retro-Party", date: "22.03.2026, 22:00 Uhr", location: "Kulturladen Harburg", description: "Die besten Hits der 70er, 80er und 90er." }
                    ],
                    theater: [
                        { name: "Theaterstück: Der Harburger Schatz", date: "19.03.2026, 20:00 Uhr", location: "Theater Harburg", description: "Ein humorvolles Stück über die Geschichte Harburgs." },
                        { name: "Kabarett-Abend", date: "21.03.2026, 19:30 Uhr", location: "Kulturzentrum Harburg", description: "Politisches Kabarett mit regionalem Bezug." }
                    ],
                    ausstellung: [
                        { name: "Kunstausstellung: Harburger Künstler", date: "18.03.–24.03.2026, 11:00–19:00 Uhr", location: "Galerie Harburg", description: "Werke lokaler Künstler aus Harburg." },
                        { name: "Historische Ausstellung: Harburg früher", date: "20.03.2026, 14:00 Uhr", location: "Stadtmuseum Harburg", description: "Fotos und Dokumente zur Geschichte Harburgs." }
                    ],
                    konzerte: [
                        { name: "Konzert: Harburger Musiknacht", date: "20.03.2026, 19:30 Uhr", location: "Stadthalle Harburg", description: "Lokale Bands und Solo-Künstler präsentieren ihr Repertoire." },
                        { name: "Klassik-Abend mit dem Harburg Orchester", date: "22.03.2026, 20:00 Uhr", location: "Kulturkirche Harburg", description: "Klassische Musik in historischer Atmosphäre." }
                    ]
                }
            };

            const eventsList = document.getElementById('events-list');
            let html = '';
            
            // Events für die aktuelle Stadt und den aktuellen Zeitraum filtern
            const cityEvents = allEvents[currentCity];
            for (const [category, categoryEvents] of Object.entries(cityEvents)) {
                const filteredEvents = categoryEvents.filter(event => {
                    // Prüfe, ob das Event im aktuellen Zeitraum liegt
                    return isEventInRange(event.date, dateRange.start, dateRange.end);
                });
                
                if (filteredEvents.length > 0) {
                    html += `<div class="category">
                        <h3>${category.charAt(0).toUpperCase() + category.slice(1)}</h3>`;
                    filteredEvents.forEach(event => {
                        html += `<div class="event-item">
                            <div class="event-date">${event.date}</div>
                            <div><strong>${event.name}</strong></div>
                            <div class="event-location">${event.location}</div>
                            <div>${event.description}</div>
                        </div>`;
                    });
                    html += `</div>`;
                }
            }
            
            eventsList.innerHTML = html || '<p>Keine Events im ausgewählten Zeitraum gefunden.</p>';
        }

        // Stadt wechseln
        function updateCity() {
            currentCity = document.getElementById('city-select').value;
            fetchWeather();
            loadEvents();
        }

        // Daten beim Laden der Seite abrufen
        document.addEventListener('DOMContentLoaded', () => {
            updateTime();
            fetchWeather();
            loadEvents();
        });
    </script>
</body>
</html>
